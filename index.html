<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>多桌点餐记账</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="点餐记账">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f2f4f8; margin: 0; padding: 16px; min-height: 100vh; overflow-x: hidden; }
        .app-container {
            max-width: 1400px; margin: 0 auto;
            display: flex; flex-wrap: nowrap; gap: 20px; align-items: flex-start;
            min-width: 820px; /* 保证左右并排的最低宽度 */
        }
        /* 如需在小屏上水平滚动，可给 body 加 overflow-x: auto; 已用 min-width 保证 */
        .card { background: white; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 24px; }
        .left-area { flex: 2; min-width: 300px; }
        .right-area { flex: 3; min-width: 380px; display: flex; flex-direction: column; gap: 20px; }
        .order-section, .bill-section { width: 100%; }

        h2 { font-size: 1.5rem; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; color: #1e293b; }
        .table-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .table-btn { background: #eef2ff; border: none; border-radius: 30px; padding: 12px 20px; font-weight: 600; font-size: 1.1rem; cursor: pointer; min-width: 56px; text-align: center; touch-action: manipulation; }
        .table-btn.active { background: #2c7a4b; color: white; box-shadow: 0 2px 4px rgba(44,122,75,0.3); }
        .table-btn.has-order { border: 3px solid #f59e0b; }
        .category-tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; margin: 0 0 12px 0; padding-bottom: 4px; }
        .category-tab { background: #f1f5f9; border: none; border-radius: 30px; padding: 8px 18px; font-size: 0.95rem; font-weight: 500; cursor: pointer; white-space: nowrap; touch-action: manipulation; }
        .category-tab.active { background: #2c7a4b; color: white; }
        .menu-grid { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
        .menu-item { background: #f8fafc; border-radius: 20px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .menu-info { display: flex; flex-direction: column; }
        .menu-name { font-weight: 600; font-size: 1.1rem; }
        .menu-price { color: #2c7a4b; font-weight: 700; margin-top: 2px; }
        button { background: #eef2ff; border: none; border-radius: 40px; padding: 10px 20px; font-size: 1rem; font-weight: 500; cursor: pointer; touch-action: manipulation; }
        button.primary { background: #2c7a4b; color: white; }
        button.primary:hover { background: #1f5a38; }
        button.danger { background: #fee2e2; color: #b91c1c; }
        button.danger:hover { background: #fecaca; }
        button.secondary { background: #e2e8f0; }
        .order-list, .bill-list { list-style: none; margin: 12px 0; padding: 0; max-height: 380px; overflow-y: auto; }
        .order-item, .bill-item { background: #f9f9fc; border-radius: 18px; padding: 14px 18px; margin-bottom: 10px; border-left: 5px solid #2c7a4b; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
        .order-item.extra-item { border-left-color: #8b5cf6; background: #f5f3ff; }
        .bill-item { border-left-color: #3b82f6; flex-direction: column; align-items: stretch; }
        .order-details { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .order-title { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
        .order-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
        .order-controls button { padding: 6px 14px; font-size: 1rem; min-width: 40px; }
        .spiciness-badge { background: #fef3c7; border-radius: 16px; padding: 2px 10px; font-size: 0.8rem; font-weight: 600; color: #92400e; }
        .notes-text { font-size: 0.85rem; color: #475569; font-style: italic; }
        .total-row { border-top: 2px dashed #cbd5e1; padding-top: 14px; font-weight: bold; font-size: 1.4rem; text-align: right; display: flex; justify-content: space-between; margin-top: 8px; }
        .bill-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
        .stats { background: #e6f7ed; border-radius: 20px; padding: 8px 20px; font-weight: bold; font-size: 1.1rem; color: #14532d; }
        .empty-msg { color: #94a3b8; text-align: center; padding: 24px; font-style: italic; font-size: 1.05rem; }
        .action-buttons { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
        .action-buttons button { flex: 1; min-width: 120px; text-align: center; }
        .manage-menu-btn { background: #e2e3e8; margin-bottom: 8px; }
        .table-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        .table-actions button { flex: 1; min-width: 80px; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; max-width: 560px; width: 92%; border-radius: 32px; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .menu-editor-item { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
        input, select { padding: 12px 16px; border-radius: 30px; border: 1px solid #ccc; font-size: 1rem; }
        hr { margin: 16px 0; }
        .replace-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 1.05rem; }
        .flavor-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .flavor-btn { background: #f1f5f9; border: 2px solid transparent; border-radius: 30px; padding: 8px 16px; font-size: 0.9rem; cursor: pointer; }
        .flavor-btn.selected { background: #fde68a; border-color: #f59e0b; }
        .modal-input { width: 100%; padding: 12px 16px; border-radius: 30px; border: 1px solid #ccc; margin: 8px 0; font-size: 1rem; }
        .extra-charge-area { margin-top: 8px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .extra-charge-area input { flex: 1; min-width: 120px; }
        .extra-charge-area button { padding: 10px 16px; }
        .quick-amounts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .quick-amounts button { padding: 4px 12px; font-size: 0.85rem; border-radius: 20px; background: #e0e7ff; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="left-area card">
        <h2>📋 菜单 &amp; 桌号</h2>
        <div class="table-selector" id="tableSelector"></div>
        <div class="table-actions">
            <button id="moveTableBtn" class="secondary">🔄 换桌</button>
            <button id="cancelOrderBtn" class="danger">🗑 撤单</button>
            <button id="manageMenuBtn" class="manage-menu-btn">✏️ 管理菜品</button>
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div id="menuListContainer" class="menu-grid"></div>
    </div>
    <div class="right-area">
        <div class="order-section card">
            <h2>🛒 当前桌订单 <span id="currentTableDisplay" style="font-size:1.2rem; color:#2c7a4b;">(1号桌)</span></h2>
            <div id="orderItemsList" class="order-list"><div class="empty-msg">暂无点餐</div></div>
            <!-- 额外加减钱区域 -->
            <div class="extra-charge-area">
                <input type="number" id="extraAmount" placeholder="金额，正数加收负数优惠" step="0.1" style="width:180px;">
                <input type="text" id="extraNote" placeholder="备注（如打包费）" style="width:140px;">
                <button id="addExtraBtn" class="primary" style="padding:10px 16px;">添加费用</button>
            </div>
            <div class="quick-amounts">
                <span style="font-size:0.85rem; color:#64748b;">快捷金额：</span>
                <button class="quick-amount" data-amount="5">+5</button>
                <button class="quick-amount" data-amount="10">+10</button>
                <button class="quick-amount" data-amount="20">+20</button>
                <button class="quick-amount" data-amount="-5">-5</button>
                <button class="quick-amount" data-amount="-10">-10</button>
            </div>
            <div class="total-row"><span>合计</span><span id="orderTotal">0.00</span></div>
            <div class="action-buttons">
                <button id="checkoutBtn" class="primary">✅ 记账结账</button>
                <button id="clearOrderBtn" class="danger">清空本桌</button>
            </div>
        </div>
        <div class="bill-section card">
            <div class="bill-header">
                <h2>📒 账单流水</h2>
                <div class="stats" id="totalRevenueDisplay">总收入: ¥0</div>
            </div>
            <button id="clearAllBillsBtn" style="background:#f1f5f9; margin-bottom:12px; padding:10px 20px;">🧹 清空所有账单</button>
            <div id="billListContainer" class="bill-list"><div class="empty-msg">暂无账单</div></div>
        </div>
    </div>
</div>

<!-- 添加菜品口味选择模态框（保持不变） -->
<div id="addItemModal" class="modal">
    <div class="modal-content">
        <h3>➕ 添加 <span id="addItemName"></span></h3>
        <div>
            <strong>辣度（可选）</strong>
            <div class="flavor-group" id="spicinessGroup">
                <button class="flavor-btn" data-spice="不辣">不辣</button>
                <button class="flavor-btn" data-spice="轻微辣">轻微辣</button>
                <button class="flavor-btn" data-spice="微辣">微辣</button>
                <button class="flavor-btn" data-spice="中辣">中辣</button>
                <button class="flavor-btn" data-spice="麻辣">麻辣</button>
            </div>
        </div>
        <input type="text" class="modal-input" id="addItemNote" placeholder="备注（如少油、去香菜）">
        <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:16px;">
            <button id="closeAddItemModalBtn">取消</button>
            <button id="confirmAddItemBtn" class="primary">加入订单</button>
        </div>
    </div>
</div>

<!-- 管理菜品模态框 -->
<div id="menuModal" class="modal"><div class="modal-content"><h3>🥗 编辑菜品</h3><div id="menuEditorList"></div><button id="addMenuItemBtn" style="background:#e9ecef; margin-top:8px; padding:10px 20px;">+ 添加新菜品</button><hr><div style="display:flex; justify-content:flex-end; gap:12px;"><button id="closeModalBtn" style="padding:10px 24px;">取消</button><button id="saveMenuBtn" class="primary" style="padding:10px 24px;">保存菜单</button></div></div></div>

<!-- 换桌模态框 -->
<div id="moveTableModal" class="modal"><div class="modal-content"><h3>🔄 换桌</h3><p style="font-size:1.1rem;">将当前 <strong id="moveFromTable"></strong> 桌的订单移动到目标桌：</p><select id="targetTableSelect" style="padding:12px 16px; font-size:1rem; width:100%;"></select><div style="margin-top:16px; display:flex; gap:12px; justify-content:flex-end;"><button id="closeMoveModalBtn" style="padding:10px 24px;">取消</button><button id="confirmMoveBtn" class="primary" style="padding:10px 24px;">确认移动</button></div></div></div>

<!-- 撤单模态框 -->
<div id="cancelModal" class="modal"><div class="modal-content"><h3>🗑 撤单</h3><p style="font-size:1.1rem;">确定撤销当前 <strong id="cancelTableDisplay"></strong> 桌的全部订单吗？</p><input type="text" id="cancelReason" placeholder="可选：填写撤单原因" style="width:100%; margin:8px 0; padding:12px 16px;"><div style="display:flex; gap:12px; justify-content:flex-end;"><button id="closeCancelModalBtn" style="padding:10px 24px;">取消</button><button id="confirmCancelBtn" class="danger" style="padding:10px 24px;">确认撤单</button></div></div></div>

<!-- 更换菜品模态框 -->
<div id="replaceModal" class="modal"><div class="modal-content"><h3>🔄 更换菜品</h3><p style="font-size:1.1rem;">将 <strong id="replaceOldName"></strong> 更换为：</p><div id="replaceMenuList"></div><div style="margin-top:16px; display:flex; gap:12px; justify-content:flex-end;"><button id="closeReplaceModalBtn" style="padding:10px 24px;">取消</button></div></div></div>

<script>
// ---------- 数据 ----------
let menu = [];
let tableOrders = {};
let bills = [];
let currentTable = '1';
let currentCategory = 'all';
let replaceTarget = null;
let pendingMenuItem = null;

const SK = { MENU: 'multi_table_menu_v2', TABLE_ORDERS: 'multi_table_orders_v2', BILLS: 'multi_table_bills_v2' };

const DEFAULT_MENU = [
    { id:'1', name:'饮料1', price:2, category:'饮料系列' },
    { id:'2', name:'饮料2', price:3, category:'饮料系列' },
    { id:'3', name:'饮料3', price:4, category:'饮料系列' },
    { id:'4', name:'饮料4', price:5, category:'饮料系列' },
    { id:'5', name:'饮料5', price:6, category:'饮料系列' },
    { id:'6', name:'饮料6', price:10, category:'饮料系列' },
    { id:'7', name:'花甲', price:25, category:'海鲜系列' },
    { id:'8', name:'蛏子', price:35, category:'海鲜系列' },
    { id:'9', name:'钉螺', price:35, category:'海鲜系列' },
    { id:'10', name:'海螺', price:25, category:'海鲜系列' },
    { id:'11', name:'鱿鱼须（小）', price:35, category:'海鲜系列' },
    { id:'12', name:'鱿鱼须（大）', price:70, category:'海鲜系列' },
    { id:'13', name:'虾尾（小）', price:50, category:'海鲜系列' },
    { id:'14', name:'虾尾（大）', price:80, category:'海鲜系列' },
    { id:'15', name:'基围虾', price:45, category:'海鲜系列' },
    { id:'16', name:'墨鱼仔', price:40, category:'海鲜系列' },
    { id:'17', name:'清蒸花甲', price:25, category:'海鲜系列' },
    { id:'18', name:'清蒸蛏子', price:35, category:'海鲜系列' },
    { id:'19', name:'蟹钳', price:50, category:'海鲜系列' },
    { id:'20', name:'扇贝肉', price:50, category:'海鲜系列' },
    { id:'21', name:'清蒸大闸蟹（小）', price:60, category:'海鲜系列' },
    { id:'22', name:'清蒸大闸蟹（大）', price:95, category:'海鲜系列' },
    { id:'23', name:'清蒸生蚝（小5只）', price:30, category:'海鲜系列' },
    { id:'24', name:'清蒸生蚝（大8只）', price:48, category:'海鲜系列' },
    { id:'25', name:'土豆', price:12, category:'素菜系列' },
    { id:'26', name:'娃娃菜', price:12, category:'素菜系列' },
    { id:'27', name:'黄豆芽', price:12, category:'素菜系列' },
    { id:'28', name:'豆腐', price:12, category:'素菜系列' },
    { id:'29', name:'豆腐皮', price:12, category:'素菜系列' },
    { id:'30', name:'海带丝', price:12, category:'素菜系列' },
    { id:'31', name:'金针菇', price:15, category:'素菜系列' },
    { id:'32', name:'香菇', price:20, category:'素菜系列' },
    { id:'33', name:'蟹味菇', price:20, category:'素菜系列' },
    { id:'34', name:'双拼', price:15, category:'素菜系列' },
    { id:'35', name:'三拼', price:18, category:'素菜系列' },
    { id:'36', name:'菌类大拼', price:20, category:'素菜系列' },
    { id:'37', name:'鸭血豆芽', price:15, category:'素菜系列' },
    { id:'38', name:'土豆粉', price:15, category:'素菜系列' },
    { id:'39', name:'川粉', price:15, category:'素菜系列' },
    { id:'40', name:'酥肉', price:40, category:'肉类系列' },
    { id:'41', name:'鸡腿', price:30, category:'肉类系列' },
    { id:'42', name:'脆皮肠', price:25, category:'肉类系列' },
    { id:'43', name:'蟹黄包', price:30, category:'肉类系列' },
    { id:'44', name:'方便面', price:2, category:'面类系列' },
    { id:'45', name:'粉丝', price:2, category:'面类系列' },
    { id:'46', name:'烩面', price:2, category:'面类系列' },
    { id:'47', name:'青菜', price:2, category:'面类系列' },
    { id:'48', name:'芥末黄瓜', price:12, category:'凉调系列' },
    { id:'49', name:'小番茄', price:12, category:'凉调系列' },
    { id:'50', name:'花生米', price:5, category:'凉调系列' }
];

const ALL_CATEGORIES = ['饮料系列','海鲜系列','素菜系列','肉类系列','面类系列','凉调系列'];

function saveMenu() { localStorage.setItem(SK.MENU, JSON.stringify(menu)); }
function saveTableOrders() { localStorage.setItem(SK.TABLE_ORDERS, JSON.stringify(tableOrders)); }
function saveBills() { localStorage.setItem(SK.BILLS, JSON.stringify(bills)); }

function loadData() {
    const sm = localStorage.getItem(SK.MENU);
    if (sm) {
        menu = JSON.parse(sm);
    } else {
        menu = DEFAULT_MENU.map(m => ({...m}));
        saveMenu();
    }
    const so = localStorage.getItem(SK.TABLE_ORDERS);
    if (so) { tableOrders = JSON.parse(so); } else { tableOrders = {}; saveTableOrders(); }
    const sb = localStorage.getItem(SK.BILLS);
    if (sb) { bills = JSON.parse(sb); } else { bills = []; saveBills(); }
}

function getCurrentOrder() { return tableOrders[currentTable] || []; }
function setCurrentOrder(o) {
    if (o && o.length > 0) { tableOrders[currentTable] = o; }
    else { delete tableOrders[currentTable]; }
    saveTableOrders();
    renderAll();
}
function getTableOrder(t) { return tableOrders[t] || []; }

function getCategories() {
    const cats = new Set(menu.map(i => i.category || '未分类'));
    return Array.from(cats);
}

// ---------- 渲染 ----------
function renderAll() {
    renderTableSelector();
    renderCategoryTabs();
    renderMenu();
    renderOrder();
    renderBills();
    updateTotalRevenue();
    document.getElementById('currentTableDisplay').innerText = '(' + currentTable + '号桌)';
}

function renderTableSelector() {
    const c = document.getElementById('tableSelector');
    let h = '';
    for (let i = 1; i <= 20; i++) {
        const k = String(i);
        const has = tableOrders[k] && tableOrders[k].length > 0;
        const act = k === currentTable ? 'active' : '';
        const hc = has ? 'has-order' : '';
        h += `<button class="table-btn ${act} ${hc}" data-table="${k}">${i}</button>`;
    }
    c.innerHTML = h;
    c.querySelectorAll('.table-btn').forEach(b => {
        b.addEventListener('click', function() {
            currentTable = this.dataset.table;
            renderAll();
        });
    });
}

function renderCategoryTabs() {
    const container = document.getElementById('categoryTabs');
    const cats = getCategories();
    let html = `<button class="category-tab ${currentCategory==='all'?'active':''}" data-cat="all">全部</button>`;
    cats.forEach(cat => {
        html += `<button class="category-tab ${currentCategory===cat?'active':''}" data-cat="${esc(cat)}">${esc(cat)}</button>`;
    });
    container.innerHTML = html;
    container.querySelectorAll('.category-tab').forEach(btn => {
        btn.addEventListener('click', function() {
            currentCategory = this.dataset.cat;
            renderCategoryTabs();
            renderMenu();
        });
    });
}

function renderMenu() {
    const c = document.getElementById('menuListContainer');
    let filtered = menu;
    if (currentCategory !== 'all') {
        filtered = menu.filter(item => (item.category || '未分类') === currentCategory);
    }
    if (filtered.length === 0) {
        c.innerHTML = '<div class="empty-msg">该分类暂无菜品</div>';
        return;
    }
    c.innerHTML = filtered.map(item => {
        return `<div class="menu-item">
            <div class="menu-info">
                <span class="menu-name">${esc(item.name)}</span>
                <span class="menu-price">¥${item.price}</span>
            </div>
            <button class="add-item-trigger" data-id="${item.id}" data-name="${esc(item.name)}" data-price="${item.price}" style="padding:8px 18px;">+ 点餐</button>
        </div>`;
    }).join('');
    c.querySelectorAll('.add-item-trigger').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            const name = this.dataset.name;
            const price = parseFloat(this.dataset.price);
            openAddItemModal(id, name, price);
        });
    });
}

// ---------- 添加菜品（带口味/备注） ----------
function openAddItemModal(id, name, price) {
    pendingMenuItem = { id, name, price };
    document.getElementById('addItemName').innerText = name;
    document.getElementById('addItemNote').value = '';
    const flavorBtns = document.querySelectorAll('#spicinessGroup .flavor-btn');
    flavorBtns.forEach(b => b.classList.remove('selected'));
    flavorBtns[0].classList.add('selected');
    document.getElementById('addItemModal').style.display = 'flex';
}

function closeAddItemModal() {
    document.getElementById('addItemModal').style.display = 'none';
    pendingMenuItem = null;
}

function confirmAddItem() {
    if (!pendingMenuItem) return;
    const selectedFlavor = document.querySelector('#spicinessGroup .flavor-btn.selected');
    const spiciness = selectedFlavor ? selectedFlavor.dataset.spice : '不辣';
    const notes = document.getElementById('addItemNote').value.trim();
    const o = getCurrentOrder();
    o.push({
        menuItemId: pendingMenuItem.id,
        name: pendingMenuItem.name,
        price: pendingMenuItem.price,
        quantity: 1,
        spiciness: spiciness,
        notes: notes,
        isExtra: false
    });
    setCurrentOrder(o);
    closeAddItemModal();
    renderAll();
}

// ---------- 额外加减钱功能 ----------
function addExtraCharge(amount, note) {
    if (isNaN(amount) || amount === 0) { alert('请输入有效金额（正数加收，负数优惠）'); return; }
    const o = getCurrentOrder();
    const name = amount >= 0 ? '额外加收' : '优惠';
    o.push({
        menuItemId: null,
        name: name,
        price: amount,
        quantity: 1,
        spiciness: '',
        notes: note || '',
        isExtra: true
    });
    setCurrentOrder(o);
}

// ---------- 订单渲染（含额外费用样式） ----------
function renderOrder() {
    const c = document.getElementById('orderItemsList');
    const ts = document.getElementById('orderTotal');
    const o = getCurrentOrder();
    if (!o || o.length === 0) {
        c.innerHTML = '<div class="empty-msg">暂无点餐</div>';
        ts.innerText = '0.00';
        return;
    }
    let total = 0;
    let html = o.map((item, index) => {
        const sub = item.price * item.quantity;
        total += sub;
        const isExtra = item.isExtra;
        let flavorHtml = (!isExtra && item.spiciness && item.spiciness !== '不辣') ? `<span class="spiciness-badge">🌶 ${esc(item.spiciness)}</span>` : '';
        let notesHtml = (item.notes) ? `<span class="notes-text">📝 ${esc(item.notes)}</span>` : '';
        const itemClass = isExtra ? 'order-item extra-item' : 'order-item';
        return `<div class="${itemClass}" data-index="${index}">
            <div class="order-details">
                <div class="order-title">
                    <strong>${esc(item.name)}</strong> ${isExtra ? '' : 'x ' + item.quantity}
                    ${flavorHtml}
                </div>
                ${notesHtml}
                <span style="font-weight:bold; margin-top:2px;">¥${sub.toFixed(2)}</span>
            </div>
            <div class="order-controls">
                ${!isExtra ? `
                <button class="order-dec" data-index="${index}">−</button>
                <span style="min-width:32px;text-align:center;font-weight:bold;">${item.quantity}</span>
                <button class="order-inc" data-index="${index}">+</button>
                <button class="order-replace" data-index="${index}" style="background:#dbeafe;">🔄</button>
                ` : ''}
                <button class="order-remove" data-index="${index}" style="background:#fee2e2;color:#b91c1c;">✖</button>
            </div>
        </div>`;
    }).join('');
    c.innerHTML = html;
    ts.innerText = total.toFixed(2);
    c.querySelectorAll('.order-dec').forEach(b => b.addEventListener('click', function() { updateQuantity(parseInt(this.dataset.index), -1); }));
    c.querySelectorAll('.order-inc').forEach(b => b.addEventListener('click', function() { updateQuantity(parseInt(this.dataset.index), 1); }));
    c.querySelectorAll('.order-remove').forEach(b => b.addEventListener('click', function() { removeItem(parseInt(this.dataset.index)); }));
    c.querySelectorAll('.order-replace').forEach(b => b.addEventListener('click', function() { openReplaceModal(parseInt(this.dataset.index)); }));
}

function updateQuantity(idx, delta) {
    const o = getCurrentOrder();
    if (!o[idx] || o[idx].isExtra) return; // 额外费用项不可改数量
    const n = o[idx].quantity + delta;
    if (n <= 0) { o.splice(idx, 1); }
    else { o[idx].quantity = n; }
    setCurrentOrder(o);
}

function removeItem(idx) {
    const o = getCurrentOrder();
    o.splice(idx, 1);
    setCurrentOrder(o);
}

// ---------- 结账 ----------
function checkout() {
    const o = getCurrentOrder();
    if (!o || o.length === 0) { alert('当前桌没有点餐'); return; }
    const total = o.reduce((s, i) => s + i.price * i.quantity, 0);
    const nb = {
        id: Date.now().toString(),
        dateTime: new Date().toLocaleString(),
        table: currentTable,
        items: JSON.parse(JSON.stringify(o)),
        total: total
    };
    bills.unshift(nb);
    saveBills();
    delete tableOrders[currentTable];
    saveTableOrders();
    renderAll();
}

// ---------- 账单 ----------
function renderBills() {
    const c = document.getElementById('billListContainer');
    if (bills.length === 0) {
        c.innerHTML = '<div class="empty-msg">暂无账单</div>';
        return;
    }
    let html = bills.map(bill => {
        const itemsStr = bill.items.map(it => {
            let extra = '';
            if (!it.isExtra && it.spiciness && it.spiciness !== '不辣') extra += ` (${it.spiciness})`;
            if (it.notes) extra += ` [${it.notes}]`;
            return it.name + extra + (it.isExtra ? '' : ' x' + it.quantity);
        }).join('、');
        return `<div class="bill-item">
            <div style="display:flex;justify-content:space-between;width:100%;">
                <span style="font-size:0.9rem;color:#4b5563;">🕒 ${bill.dateTime}  ·  ${bill.table}号桌</span>
                <button class="delete-bill" data-id="${bill.id}" style="background:transparent;color:#b91c1c;padding:4px 12px;font-size:1rem;">✖ 删除</button>
            </div>
            <div style="font-size:1rem;">${esc(itemsStr)}</div>
            <div style="font-weight:bold;text-align:right;font-size:1.2rem;">¥${bill.total.toFixed(2)}</div>
        </div>`;
    }).join('');
    c.innerHTML = html;
    c.querySelectorAll('.delete-bill').forEach(b => {
        b.addEventListener('click', function() {
            bills = bills.filter(x => x.id !== this.dataset.id);
            saveBills();
            renderBills();
            updateTotalRevenue();
        });
    });
}

function updateTotalRevenue() {
    const t = bills.reduce((s, b) => s + b.total, 0);
    document.getElementById('totalRevenueDisplay').innerText = '总收入: ¥' + t.toFixed(2);
}

// ---------- 清空/移动/撤单 ----------
function clearCurrentTable() {
    const o = getCurrentOrder();
    if (!o || o.length === 0) return alert('当前桌无订单');
    if (confirm('确定清空 ' + currentTable + ' 号桌的全部订单吗？')) {
        delete tableOrders[currentTable];
        saveTableOrders();
        renderAll();
    }
}

function openMoveTable() {
    const o = getCurrentOrder();
    if (!o || o.length === 0) { alert('当前桌没有订单可移动'); return; }
    document.getElementById('moveFromTable').innerText = currentTable;
    const sel = document.getElementById('targetTableSelect');
    sel.innerHTML = '';
    for (let i = 1; i <= 20; i++) {
        const k = String(i);
        if (k === currentTable) continue;
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = i + '号桌' + (tableOrders[k] && tableOrders[k].length > 0 ? ' (已有订单)' : '');
        sel.appendChild(opt);
    }
    document.getElementById('moveTableModal').style.display = 'flex';
}

function confirmMove() {
    const target = document.getElementById('targetTableSelect').value;
    if (!target) return alert('请选择目标桌号');
    const cur = getCurrentOrder();
    if (!cur || cur.length === 0) { closeMoveModal(); return; }
    let tar = getTableOrder(target).slice();
    cur.forEach(item => {
        const exist = tar.find(t => t.menuItemId === item.menuItemId && t.spiciness === item.spiciness && t.notes === item.notes && t.isExtra === item.isExtra);
        if (exist && !item.isExtra) { exist.quantity += item.quantity; }
        else { tar.push({...item}); }
    });
    tableOrders[target] = tar;
    delete tableOrders[currentTable];
    saveTableOrders();
    currentTable = target;
    closeMoveModal();
    renderAll();
}
function closeMoveModal() { document.getElementById('moveTableModal').style.display = 'none'; }

function openCancel() {
    const o = getCurrentOrder();
    if (!o || o.length === 0) { alert('当前桌没有订单可撤'); return; }
    document.getElementById('cancelTableDisplay').innerText = currentTable;
    document.getElementById('cancelReason').value = '';
    document.getElementById('cancelModal').style.display = 'flex';
}
function confirmCancel() {
    const reason = document.getElementById('cancelReason').value.trim() || '无原因';
    delete tableOrders[currentTable];
    saveTableOrders();
    alert('已撤消 ' + currentTable + ' 号桌订单，原因：' + reason);
    closeCancelModal();
    renderAll();
}
function closeCancelModal() { document.getElementById('cancelModal').style.display = 'none'; }

// ---------- 更换菜品 ----------
function openReplaceModal(idx) {
    const o = getCurrentOrder();
    if (!o[idx] || o[idx].isExtra) return; // 额外费用不可更换
    replaceTarget = { table: currentTable, index: idx };
    document.getElementById('replaceOldName').innerText = o[idx].name;
    const c = document.getElementById('replaceMenuList');
    c.innerHTML = menu.map(item => {
        if (item.id === o[idx].menuItemId) return '';
        return `<div class="replace-item"><span>${esc(item.name)} (¥${item.price})</span><button class="replace-select" data-id="${item.id}" data-name="${esc(item.name)}" data-price="${item.price}" style="padding:6px 18px;">选择</button></div>`;
    }).join('');
    document.getElementById('replaceModal').style.display = 'flex';
    c.querySelectorAll('.replace-select').forEach(b => {
        b.addEventListener('click', function() {
            confirmReplace(this.dataset.id, this.dataset.name, parseFloat(this.dataset.price));
        });
    });
}
function confirmReplace(nid, nname, nprice) {
    if (!replaceTarget) return;
    const o = getTableOrder(replaceTarget.table);
    if (!o[replaceTarget.index]) return;
    if (o[replaceTarget.index].menuItemId === nid) { alert('已选择相同菜品'); closeReplaceModal(); return; }
    o[replaceTarget.index].menuItemId = nid;
    o[replaceTarget.index].name = nname;
    o[replaceTarget.index].price = nprice;
    tableOrders[replaceTarget.table] = o;
    saveTableOrders();
    closeReplaceModal();
    replaceTarget = null;
    renderAll();
}
function closeReplaceModal() { document.getElementById('replaceModal').style.display = 'none'; replaceTarget = null; }

// ---------- 管理菜品 ----------
function openMenuModal() { renderMenuEditor(); document.getElementById('menuModal').style.display = 'flex'; }
function renderMenuEditor() {
    const ed = document.getElementById('menuEditorList');
    ed.innerHTML = menu.map(item => {
        return `<div class="menu-editor-item" data-id="${item.id}">
            <input type="text" class="edit-name" value="${esc(item.name)}" placeholder="菜名" style="flex:2;">
            <input type="number" class="edit-price" value="${item.price}" step="0.5" placeholder="价格" style="flex:1;">
            <input type="text" class="edit-category" value="${esc(item.category||'')}" placeholder="分类" list="category-list" style="flex:1.5;">
            <datalist id="category-list">
                ${ALL_CATEGORIES.map(c => `<option value="${c}">`).join('')}
            </datalist>
            <button class="remove-menu-item" data-id="${item.id}" style="background:#fecaca;padding:8px 14px;">删除</button>
        </div>`;
    }).join('');
    ed.querySelectorAll('.remove-menu-item').forEach(b => {
        b.addEventListener('click', function() {
            const id = this.dataset.id;
            for (let t in tableOrders) {
                if (tableOrders[t].some(i => i.menuItemId === id)) {
                    alert('该菜品正在某些桌的订单中，请先清空相应订单再删除');
                    return;
                }
            }
            menu = menu.filter(m => m.id !== id);
            renderMenuEditor();
        });
    });
}
function saveMenuFromModal() {
    const items = document.querySelectorAll('#menuEditorList .menu-editor-item');
    const nm = [];
    let maxId = Math.max(...menu.map(m => parseInt(m.id) || 0), 0);
    items.forEach(div => {
        const name = div.querySelector('.edit-name').value.trim();
        const price = parseFloat(div.querySelector('.edit-price').value);
        const category = div.querySelector('.edit-category').value.trim() || '未分类';
        if (!name || isNaN(price) || price < 0) return;
        let id = div.dataset.id;
        if (!id || !menu.some(m => m.id === id)) { maxId++; id = String(maxId); }
        nm.push({ id, name, price, category });
    });
    if (nm.length === 0) { alert('菜单不能为空'); return; }
    const nids = new Set(nm.map(m => m.id));
    let conflict = false;
    for (let t in tableOrders) {
        const orphan = tableOrders[t].filter(item => !nids.has(item.menuItemId));
        if (orphan.length > 0) {
            if (!confirm(`桌 ${t} 中有菜品"${orphan.map(o=>o.name).join(',')}"被删除，是否清空该桌订单？`)) {
                conflict = true; break;
            } else { delete tableOrders[t]; }
        }
    }
    if (conflict) return;
    menu = nm;
    saveMenu();
    saveTableOrders();
    closeModal();
    renderAll();
}
function addNewMenuItem() {
    const ed = document.getElementById('menuEditorList');
    const nid = 'temp_' + Date.now();
    ed.insertAdjacentHTML('beforeend', `<div class="menu-editor-item" data-id="${nid}">
        <input type="text" class="edit-name" placeholder="新菜品" value="新菜" style="flex:2;">
        <input type="number" class="edit-price" value="18" step="0.5" style="flex:1;">
        <input type="text" class="edit-category" placeholder="分类" list="category-list" value="未分类" style="flex:1.5;">
        <button class="remove-menu-item" data-id="${nid}" style="background:#fecaca;padding:8px 14px;">删除</button>
    </div>`);
    ed.querySelectorAll('.remove-menu-item').forEach(b => {
        b.removeEventListener('click', () => {});
        b.addEventListener('click', function() {
            const d = this.closest('.menu-editor-item');
            if (d) d.remove();
        });
    });
}
function closeModal() { document.getElementById('menuModal').style.display = 'none'; }

function esc(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
}

// ---------- 事件绑定 ----------
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    renderAll();

    document.getElementById('checkoutBtn').addEventListener('click', checkout);
    document.getElementById('clearOrderBtn').addEventListener('click', clearCurrentTable);
    document.getElementById('clearAllBillsBtn').addEventListener('click', () => {
        if (bills.length === 0) return alert('暂无账单');
        if (confirm('永久删除所有账单，不可恢复！')) { bills = []; saveBills(); renderAll(); }
    });
    document.getElementById('manageMenuBtn').addEventListener('click', openMenuModal);
    document.getElementById('addMenuItemBtn').addEventListener('click', addNewMenuItem);
    document.getElementById('saveMenuBtn').addEventListener('click', saveMenuFromModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('moveTableBtn').addEventListener('click', openMoveTable);
    document.getElementById('confirmMoveBtn').addEventListener('click', confirmMove);
    document.getElementById('closeMoveModalBtn').addEventListener('click', closeMoveModal);
    document.getElementById('cancelOrderBtn').addEventListener('click', openCancel);
    document.getElementById('confirmCancelBtn').addEventListener('click', confirmCancel);
    document.getElementById('closeCancelModalBtn').addEventListener('click', closeCancelModal);
    document.getElementById('closeReplaceModalBtn').addEventListener('click', closeReplaceModal);
    document.getElementById('confirmAddItemBtn').addEventListener('click', confirmAddItem);
    document.getElementById('closeAddItemModalBtn').addEventListener('click', closeAddItemModal);

    // 口味按钮切换
    document.querySelectorAll('#spicinessGroup .flavor-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#spicinessGroup .flavor-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
        });
    });

    // 额外加减钱功能
    document.getElementById('addExtraBtn').addEventListener('click', function() {
        const amount = parseFloat(document.getElementById('extraAmount').value);
        const note = document.getElementById('extraNote').value.trim();
        addExtraCharge(amount, note);
        document.getElementById('extraAmount').value = '';
        document.getElementById('extraNote').value = '';
    });

    // 快捷金额按钮
    document.querySelectorAll('.quick-amount').forEach(btn => {
        btn.addEventListener('click', function() {
            const amount = parseFloat(this.dataset.amount);
            document.getElementById('extraAmount').value = amount;
            document.getElementById('extraNote').value = this.innerText + ' 快捷';
            document.getElementById('addExtraBtn').click();
        });
    });

    // 点击模态框外部关闭
    window.addEventListener('click', function(e) {
        if (e.target === document.getElementById('menuModal')) closeModal();
        if (e.target === document.getElementById('moveTableModal')) closeMoveModal();
        if (e.target === document.getElementById('cancelModal')) closeCancelModal();
        if (e.target === document.getElementById('replaceModal')) closeReplaceModal();
        if (e.target === document.getElementById('addItemModal')) closeAddItemModal();
    });

    // Service Worker 注册（可注释掉避免旧缓存问题）
    // if ('serviceWorker' in navigator) {
    //     navigator.serviceWorker.register('sw.js').catch(() => {});
    // }
});
</script>
